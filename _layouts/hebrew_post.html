<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Heebo', 'Arial Hebrew', Arial, sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      font-size: 18px;
      line-height: 1.85;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 56px 48px 80px;
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      line-height: 1.3;
      color: #111;
      margin: 0 0 0.25em;
    }

    h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #111;
      margin: 2.4em 0 0.6em;
      padding-bottom: 0.3em;
      border-bottom: 2px solid #ebebeb;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.8em 0 0.4em;
    }

    p { margin: 0 0 1em; }

    strong { font-weight: 700; }

    /* Tables */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.6em 0;
      font-size: 0.95rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 9px 16px;
      text-align: right;
    }
    th {
      background: #f2f2f0;
      font-weight: 600;
    }
    tr:nth-child(even) td { background: #fafaf8; }

    /* Numeric columns — keep LTR so digits align naturally */
    td:first-child { direction: ltr; text-align: center; }

    /* Code & pre */
    code {
      font-family: 'Courier New', Courier, monospace;
      background: #f2f2f0;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 0.9em;
    }
    pre {
      background: #f2f2f0;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 18px 22px;
      overflow-x: auto;
      direction: rtl;
      font-size: 0.92rem;
      line-height: 1.7;
      margin: 1.6em 0;
    }
    pre code {
      background: none;
      padding: 0;
      font-size: inherit;
    }

    hr {
      border: none;
      border-top: 2px solid #ebebeb;
      margin: 2.5em 0;
    }

    ul, ol {
      padding-right: 1.6em;
      padding-left: 0;
      margin: 0.5em 0 1em;
    }
    li { margin-bottom: 0.3em; }

    /* Subtle top bar */
    .top-bar {
      background: #1a1a2e;
      color: #ccc;
      font-size: 0.82rem;
      padding: 10px 48px;
      letter-spacing: 0.02em;
    }
    .top-bar a { color: #9ab0d0; text-decoration: none; }
    .top-bar a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      body { font-size: 16px; }
      .container { padding: 32px 20px 60px; }
      .top-bar { padding: 10px 20px; }
      h1 { font-size: 1.65rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="/">or523.github.io</a>
  </div>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
